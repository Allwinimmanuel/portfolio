<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Alwin Immanuel J – Resume</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #b8c5d0;
      -webkit-font-smoothing: antialiased;
    }

    .bar {
      background: #111827;
      padding: 9px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .bar a {
      color: #9ca3af;
      text-decoration: none;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bar a:hover {
      color: #fff;
    }

    .bar-btns {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 6px 15px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
      transition: .2s;
    }

    .btn-p {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: #fff;
    }

    .btn-p:hover {
      transform: translateY(-1px);
    }

    .btn-o {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, .3);
    }

    .btn-o:hover {
      background: rgba(255, 255, 255, .1);
    }

    /* A4 */
    .page {
      width: 210mm;
      max-width: 100%;
      margin: 18px auto;
      background: #fff;
      box-shadow: 0 6px 40px rgba(0, 0, 0, .25);
      overflow: hidden;}

    /* ═══ LEFT DARK SIDEBAR ═══ */
    .left {
      background: #1c2b3a;
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    /* photo */
    .photo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px 14px;
      background: #152231;
      border-bottom: 2px solid #2563eb;
    }

    .photo-wrap img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 3px solid #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, .2);
      display: block;
    }

    .lbody {
      padding: 12px 13px;
      flex: 1;
    }

    .s-hd {
      font-size: .65rem;
      font-weight: 700;
      color: #3b82f6;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(59, 130, 246, .3);
      padding-bottom: 4px;
      margin-bottom: 8px;
      margin-top: 12px;
    }

    .s-hd:first-child {
      margin-top: 0;
    }

    /* personal details */
    .pd-item {
      font-size: .62rem;
      color: #cbd5e1;
      margin-bottom: 4px;
      display: flex;
      gap: 6px;
      align-items: flex-start;
      line-height: 1.35;
    }

    .pd-item i {
      color: #3b82f6;
      font-size: .58rem;
      margin-top: 2px;
      flex-shrink: 0;
      width: 10px;
    }

    .pd-item a {
      color: #93c5fd;
      text-decoration: none;
      word-break: break-all;
    }

    .pd-item a:hover {
      color: #fff;
    }

    /* skills */
    .sk-item {
      font-size: .62rem;
      color: #cbd5e1;
      margin-bottom: 3px;
      padding-left: 10px;
      position: relative;
      line-height: 1.3;
    }

    .sk-item::before {
      content: '•';
      position: absolute;
      left: 0;
      color: #3b82f6;
    }

    /* certs in left */
    .cert-l {
      font-size: .6rem;
      color: #94a3b8;
      margin-bottom: 3px;
      padding-left: 10px;
      position: relative;
      line-height: 1.3;
    }

    .cert-l::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #3b82f6;
      font-size: .55rem;
    }

    /* lang */
    .lang-r {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .lang-n {
      font-size: .62rem;
      color: #cbd5e1;
    }

    .dots {
      display: flex;
      gap: 2px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2d4a66;
    }

    .dot.on {
      background: #3b82f6;
    }

    /* ═══ RIGHT WHITE ═══ */
    .right {
      background: #fff;
      padding: 20px 22px 14px;
      overflow: hidden;
    }

    /* name block */
    .name-block {
      margin-bottom: 10px;
      border-bottom: 2px solid #1c2b3a;
      padding-bottom: 10px;
    }

    .name-block h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.65rem;
      font-weight: 800;
      color: #111827;
      letter-spacing: -.3px;
      line-height: 1.05;
    }

    .name-block .title {
      font-size: .72rem;
      font-weight: 600;
      color: #1c2b3a;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .name-block .summary {
      font-size: .69rem;
      color: #4b5563;
      line-height: 1.7;
      margin-top: 6px;
      text-align: justify;
    }

    /* section */
    .sec {
      margin-bottom: 8px;
    }

    .sec-t {
      font-size: .72rem;
      font-weight: 700;
      color: #1c2b3a;
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1.5px solid #1c2b3a;
      padding-bottom: 3px;
      margin-bottom: 7px;
    }

    /* education */
    .edu-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      margin-bottom: 6px;
    }

    .edu-icon {
      width: 14px;
      height: 14px;
      border: 1.5px solid #1c2b3a;
      border-radius: 2px;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .edu-icon i {
      font-size: .45rem;
      color: #1c2b3a;
    }

    .edu-body {}

    .edu-yr {
      font-size: .65rem;
      font-weight: 700;
      color: #1c2b3a;
    }

    .edu-school {
      font-size: .67rem;
      font-weight: 600;
      color: #111827;
    }

    .edu-deg {
      font-size: .63rem;
      color: #4b5563;
    }

    .edu-gpa {
      font-size: .63rem;
      color: #374151;
      font-weight: 500;
    }

    /* internship */
    .int {
      margin-bottom: 6px;
    }

    .int-hd {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .int-t {
      font-size: .71rem;
      font-weight: 700;
      color: #111827;
    }

    .int-d {
      font-size: .62rem;
      color: #6b7280;
      white-space: nowrap;
    }

    .int-role {
      font-size: .63rem;
      color: #1d4ed8;
      font-weight: 600;
      margin: 1px 0 3px;
    }

    .int-ul {
      padding-left: 12px;
    }

    .int-ul li {
      font-size: .63rem;
      color: #374151;
      line-height: 1.55;
      margin-bottom: 2px;
    }

    /* projects */
    .proj {
      margin-bottom: 6px;
    }

    .proj-t {
      font-size: .72rem;
      font-weight: 700;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .proj-num {
      background: #1c2b3a;
      color: #fff;
      font-size: .52rem;
      font-weight: 700;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .proj-gh {
      font-size: .58rem;
      color: #2563eb;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .proj-gh:hover {
      text-decoration: underline;
    }

    .proj-ul {
      padding-left: 14px;
      margin-top: 2px;
    }

    .proj-ul li {
      font-size: .62rem;
      color: #374151;
      line-height: 1.5;
      margin-bottom: 2px;
    }

    /* skills right */
    .skill-cat {
      font-size: .65rem;
      color: #111827;
      margin-bottom: 3px;
      line-height: 1.4;
    }

    .skill-cat strong {
      font-weight: 700;
    }

    /* achievements & certs right */
    .ach-item {
      font-size: .63rem;
      color: #374151;
      margin-bottom: 3px;
      display: flex;
      gap: 6px;
      line-height: 1.5;
    }

    .ach-item::before {
      content: '•';
      color: #1c2b3a;
      font-size: .7rem;
      flex-shrink: 0;
    }

    @media print {
      body {
        background: #fff;
      }

      .bar {
        display: none;
      }

      .page {
        margin: 0;
        box-shadow: none;
        width: 210mm;
        height: auto;
      }

      @page {
        margin: 0;
        size: A4;
      }

      .left,
      .photo-wrap {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>

<body>

  <div class="bar">
    <a href="index.html">&#8592; Portfolio</a>
    <div class="bar-btns">
      <button class="btn btn-o" onclick="window.print()"><i class="fas fa-eye"></i> View</button>
      <button class="btn btn-p" onclick="window.print()"><i class="fas fa-download"></i> Download PDF</button>
    </div>
  </div>

  <div class="page">
    <img src="image.png" alt="Alwin Immanuel J - Resume" style="width: 100%; height: auto; display: block;">
  </div>

  <script>
    function downloadResume() { window.print(); }
  </script>
</body>

</html>
